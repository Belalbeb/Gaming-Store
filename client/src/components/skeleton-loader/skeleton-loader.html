<!-- skeleton.component.html -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 p-6">

  <div *ngFor="let i of skeletonArray" class="flex flex-col gap-3">

    <!-- Image -->
    <div class="w-full h-40 sm:h-44 lg:h-48 rounded-xl bg-gray-700/60 animate-pulse"></div>

    <!-- Title -->
    <div class="h-3 w-4/5 rounded-full bg-gray-700/60 animate-pulse"></div>

    <!-- Subtitle -->
    <div class="h-3 w-2/5 rounded-full bg-gray-700/60 animate-pulse"></div>

    <!-- Buttons -->
    <div class="flex gap-2">
      <div class="h-6 w-16 rounded-full bg-gray-700/60 animate-pulse"></div>
      <div class="h-6 w-20 rounded-full bg-gray-700/60 animate-pulse"></div>
    </div>

  </div>

</div>
