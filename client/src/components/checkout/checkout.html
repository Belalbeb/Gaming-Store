<div class="bg-black p-6 w-85 mx-auto" [formGroup]="PayForm">

  <!-- Your Info -->
  <h2 class="text-white text-xl font-bold mb-4">Your info</h2>

  <div class="mb-3">
    <label class="text-white text-sm mb-1 block">Name</label>
    <input
    formControlName="name"
      type="text"
      name="name"
      placeholder="Name"
   
      class="w-full bg-white text-gray-400 placeholder-gray-400 rounded-md px-3 py-3 text-sm outline-none"
    />
  </div>

  <div class="mb-6">
    <label class="text-white text-sm mb-1 block">Email</label>
    <input
    formControlName="email"
      type="email"
      name="email"
      placeholder="Email"

      class="w-full bg-white text-gray-400 placeholder-gray-400 rounded-md px-3 py-3 text-sm outline-none"
    />
  </div>

  <!-- Payment Info -->
  <h2 class="text-white text-xl font-bold mb-4">Payment info</h2>

  <!-- Bitcoin Button -->
  <button class="w-full bg-yellow-400 text-black font-bold rounded-md py-3 flex items-center justify-start px-4 gap-2 mb-4 text-base">
    <span class="text-lg">&#8383;</span>
    <span>Bitcoin</span>
  </button>

  <!-- Address -->
  <p class="text-white text-sm mb-1">Send to this address {{ amount |async }}$</p>
  <div class="flex items-center bg-[#3a3a3a] rounded-md px-3 py-3 mb-3 gap-2">
    <span class="text-gray-300 text-xs flex-1 truncate">{{ walletAddress }}</span>
    <button (click)="copyAddress()" class="text-gray-400 hover:text-white flex-shrink-0" title="Copy">
       <i class="fa-brands fa-bitcoin"></i>
    </button>
  </div>

  <!-- Transaction ID -->
  <p class="text-white text-sm mb-1">Transaction id</p>
  <input
  formControlName="transactionId"
    type="text"
    name="transactionId"
    placeholder="Paste your transaction id here..."
    
    class="w-full bg-[#3a3a3a] text-gray-400 placeholder-gray-500 rounded-md px-3 py-3 text-xs outline-none mb-4"
  />

  <!-- Total -->
  <p class="text-white font-bold text-sm mb-4">You will pay {{ amount|async}}$</p>

  <!-- Pay Button -->
   
<button 
  (click)="onPay()"
  type="button"
  [disabled]="PayForm.invalid"
  class="bg-green-500 
         disabled:bg-gray-400 
         disabled:cursor-not-allowed 
         disabled:opacity-50
         hover:bg-[#3a3a3a]
         hover:border
         hover:border-gray-500
         text-white font-bold px-6 py-2 rounded-md text-sm transition-colors hover:cursor-pointer">
  Pay
</button>

  <!-- Copied feedback -->
  <span *ngIf="copied" class="ml-3 text-green-400 text-xs">Copied!</span>

</div>
