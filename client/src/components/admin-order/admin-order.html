<div class="min-h-screen bg-[#0d0d0d] p-4 md:p-8 font-mono">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">

    <div>
      <h1 class="text-white text-2xl font-bold tracking-widest uppercase">Orders</h1>
      <p class="text-zinc-500 text-xs tracking-wider mt-1">
        {{ orders.length }} total records
      </p>
    </div>

    <!-- Filter -->
    <select [(ngModel)]="filter" (ngModelChange)="filterOption()"
      class="bg-zinc-900 border border-zinc-700 text-zinc-200 px-4 py-2 rounded-md
             focus:outline-none focus:border-green-500 w-full md:w-40">
      <option value="1" >All</option>
      <option value="3">Rejected</option>
      <option value="2">Approved</option>
      <option value="0">Pending</option>
    </select>

  </div>

  <!-- Desktop Table -->
  <div class="hidden md:block border border-zinc-800 overflow-hidden">

    <!-- Header -->
    <div class="grid grid-cols-[2fr_80px_120px_160px_140px] bg-zinc-900 border-b border-zinc-800 px-6 py-3 text-zinc-500 text-xs uppercase tracking-widest">
      <div>Email</div>
      <div>Qty</div>
      <div>Total</div>
      <div>Status</div>
      <div>Action</div>
    </div>

    <!-- Rows -->
    <div
      *ngFor="let order of orders; let i = index"
      class="grid grid-cols-[2fr_80px_120px_160px_140px] px-6 py-4 border-b border-zinc-800 items-center hover:bg-zinc-900/40"
    >

      <div class="text-zinc-200 truncate">{{ order.email }}</div>

      <div>
        <span class="bg-zinc-800 px-2 py-1 rounded text-xs">
          {{ order.amount }}
        </span>
      </div>

      <div class="text-zinc-100 font-bold">
        {{ order.totalAmount }}$
      </div>

      <!-- Status -->
      <div>
        <span
          class="px-3 py-1 text-xs font-bold rounded border"
          [ngClass]="{
            'text-green-400 bg-green-500/10 border-green-500/30': getStatus(order.status) === 'Approved',
            'text-yellow-400 bg-yellow-500/10 border-yellow-500/30': getStatus(order.status) === 'Pending',
            'text-red-400 bg-red-500/10 border-red-500/30': getStatus(order.status) === 'Rejected'
          }"
        >
          {{ getStatus(order.status) }}
        </span>
      </div>

      <div>
        <button (click)="GotoDetails(order.id)"
          class="flex items-center gap-2 px-4 py-2 bg-green-500 text-black text-xs font-bold rounded
                 hover:bg-green-400 transition">
          Details
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Cards -->
  <div class="md:hidden space-y-4">

    <div
      *ngFor="let order of orders"
      class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 space-y-3"
    >

      <div class="flex justify-between items-center">
        <span class="text-zinc-400 text-xs">Email</span>
        <span class="text-zinc-200 text-sm truncate">{{ order.email }}</span>
      </div>

      <div class="flex justify-between">
        <span class="text-zinc-400 text-xs">Quantity</span>
        <span class="text-zinc-200">{{ order.amount }}</span>
      </div>

      <div class="flex justify-between">
        <span class="text-zinc-400 text-xs">Total</span>
        <span class="text-zinc-100 font-bold">{{ order.totalAmount }}$</span>
      </div>

      <div class="flex justify-between items-center">

        <span
          class="px-3 py-1 text-xs font-bold rounded border"
          [ngClass]="{
            'text-green-400 bg-green-500/10 border-green-500/30': getStatus(order.status) === 'Approved',
            'text-yellow-400 bg-yellow-500/10 border-yellow-500/30': getStatus(order.status) === 'Pending',
            'text-red-400 bg-red-500/10 border-red-500/30': getStatus(order.status) === 'Rejected'
          }"
        >
          {{ getStatus(order.status) }}
        </span>

        <button (click)="GotoDetails(order.id)"
          class="px-3 py-1 bg-green-500 text-black text-xs rounded hover:bg-green-400">
          Details
        </button>

      </div>

    </div>

  </div>

</div>
