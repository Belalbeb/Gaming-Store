<section class="bg-[#1A1A1A] flex flex-col md:flex-row justify-between items-center p-6 mx-5 mt-5 mb-3 rounded-2xl gap-6">

  <!-- Left Content -->
  <div class="w-full md:w-1/2 flex flex-col justify-center gap-4">
    <h1 class="text-white text-3xl md:text-4xl font-bold">Meet the new home for your digital games</h1>
    <p class="text-gray-400 text-lg md:text-xl">Find Your Games in Our Store With The Best Prices</p>
    
    <h4 class="text-white font-semibold mt-2">Join Us:</h4>
    <div class="flex gap-4 flex-wrap">
      @if(authServices.isLoggedIn()){
        <a routerLink="/dashboard" class="!no-underline bg-amber-300 text-black font-semibold rounded  px-5 py-2 hover:bg-white transition duration-200 hover:cursor-pointer"data-aos="flip-up">Go To Dashboard</a>


      }
      @else {
      <a routerLink="/signin" class="!no-underline bg-amber-300 text-black font-semibold rounded-2xl px-5 py-2 hover:bg-white transition duration-200 hover:cursor-pointer"data-aos="flip-up">Login</a>
      <a routerLink="/signup" class="!no-underline bg-amber-300 text-black font-semibold rounded-2xl px-5 py-2 hover:bg-white transition duration-200 hover:cursor-pointer"data-aos="flip-up">Register</a>

      }


    </div>
  </div>


  <div class="w-full md:w-1/2 flex flex-col justify-around rounded-2xl p-4 gap-3 bg-amber-300">
    <div class="bg-black text-white font-bold rounded-2xl p-3 text-center  hover:bg-white hover:text-black transition duration-200" data-aos="fade-right">Playstation Games</div>
    <div class="bg-black text-white font-bold rounded-2xl p-3 text-center  hover:bg-white hover:text-black transition duration-200" data-aos="fade-right">XBOX Games</div>
    <div class="bg-black text-white font-bold rounded-2xl p-3 text-center  hover:bg-white hover:text-black transition duration-200" data-aos="fade-right">PC Games</div>
  </div>

</section>


<div class="text-center mt-6 px-4">
  <input 
  (ngModelChange)="changetext()"
  [(ngModel)]="filterText"
    type="text" 
    placeholder="Search" 
    class="p-3 bg-[#1A1A1A] text-gray-400 rounded-3xl w-full md:w-1/2 border-2 border-amber-300 focus:border-amber-400 focus:ring-1 focus:ring-amber-300 outline-none transition duration-200"
  />
</div>
